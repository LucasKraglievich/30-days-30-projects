<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivia NBA 🏀</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <!-- Pantalla de inicio -->
    <div id="pantalla-inicio">
      <div class="header">
        <h1>🏀 Trivia NBA</h1>
        <p class="subtitle">Final 2026 · Spurs vs Knicks</p>
      </div>
      <div class="serie-box">
        <p class="serie-label">Estado de la serie</p>
        <div class="serie-marcador">
          <div class="equipo-serie">
            <span class="equipo-emoji">🗽</span>
            <span class="equipo-nombre">Knicks</span>
            <span class="equipo-wins">4</span>
          </div>
          <span class="serie-vs">vs</span>
          <div class="equipo-serie">
            <span class="equipo-wins">1</span>
            <span class="equipo-nombre">Spurs</span>
            <span class="equipo-emoji">🤠</span>
          </div>
        </div>
        <p class="serie-sub">🏆 ¡Knicks CAMPEONES NBA 2026!</p>
      </div>
      <button id="btn-empezar" onclick="empezar()">⚡ Empezar trivia</button>
      <p class="instrucciones-texto">10 preguntas · 15 segundos por pregunta</p>
    </div>

    <!-- Pantalla de juego -->
    <div id="pantalla-juego" style="display:none">

      <!-- Header con progreso y timer -->
      <div class="juego-header">
        <span id="progreso">Pregunta 1 / 10</span>
        <div class="timer-box">
          <span id="timer">15</span>
        </div>
      </div>

      <!-- Barra de progreso -->
      <div class="barra-fondo">
        <div id="barra-timer" class="barra-timer"></div>
      </div>

      <!-- Pregunta -->
      <div class="pregunta-box">
        <p id="pregunta-texto"></p>
      </div>

      <!-- Opciones -->
      <div id="opciones" class="opciones-grid"></div>

      <!-- Feedback -->
      <div id="feedback" class="feedback" style="display:none"></div>

    </div>

    <!-- Pantalla de resultado -->
    <div id="pantalla-resultado" style="display:none">
      <div class="header">
        <h1 id="resultado-emoji">🏆</h1>
        <h2 id="resultado-titulo"></h2>
        <p id="resultado-puntaje" class="resultado-puntaje"></p>
      </div>
      <div id="resumen-respuestas" class="resumen"></div>
      <button onclick="reiniciar()">🔄 Jugar de nuevo</button>
    </div>

    <footer>
      <p>Día 5 / 30 · Challenge de proyectos · <span>@lucaskraglievich</span></p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
